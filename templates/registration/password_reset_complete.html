{% extends 'base.html' %}

{% block title %}Password Reset Complete - ProjectHub{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 400px; margin: 5rem auto;">
    <div class="glass-card" style="text-align: center;">
        <h2 style="margin-bottom: 1rem;">Password Reset Complete</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">
            Your password has been set. You may go ahead and log in now.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="{% url 'student_login' %}" class="btn btn-primary">Student Login</a>
            <a href="{% url 'teacher_login' %}" class="btn btn-secondary">Teacher Login</a>
        </div>
    </div>
</div>
{% endblock %}
