{% extends 'base.html' %}

{% block title %}Forgot Password - ProjectHub{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 400px; margin: 5rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 1rem;">Reset Password</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">
            Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.
        </p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="Enter your email address">
            </div>
            {{ form.email.errors }}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
