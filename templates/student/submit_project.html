{% extends 'base.html' %}

{% block title %}Submit Project - {{ project.name }}{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 600px; margin: 3rem auto;">
    <div class="glass-card">
        <h1 style="margin-bottom: 1rem;">Final <span style="color: var(--accent-secondary);">Project</span> Submission</h1>
        <p style="margin-bottom: 2rem; color: var(--text-secondary);">Project: <strong>{{ project.name }}</strong></p>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Project Description/Notes</label>
                <textarea name="description" rows="4" required placeholder="Describe what you have built and how to run it..." style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.5rem; color: var(--text-primary);"></textarea>
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <label>GitHub Repository Link (Optional)</label>
                <input type="url" name="github_link" placeholder="https://github.com/your-username/repo" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.5rem; color: var(--text-primary);">
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <label>Project Files (ZIP/PDF/PPT)</label>
                <input type="file" name="file" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.5rem; color: var(--text-primary);">
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Submit Final Project</button>
                <a href="{% url 'student_project_detail' project.id %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
