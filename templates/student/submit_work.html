{% extends 'base.html' %}

{% block title %}Commit Task - {{ task.name }}{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 600px; margin: 3rem auto;">
    <div class="glass-card">
        <h2 style="margin-bottom: 2rem;">Commit <span style="color: var(--accent-secondary);">Task</span></h2>
        <p style="margin-bottom: 2rem; color: var(--text-secondary);">Project: {{ task.project.name }} | Task: {{ task.name }}</p>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Commit Message / Summary of Work</label>
                <textarea name="description" rows="6" required placeholder="Describe what you have done for this task..."></textarea>
            </div>
            
            <div class="form-group" style="margin-top: 1rem;">
                <label>Upload File (PPT, PDF, ZIP, etc.) - Max 25 MB</label>
                <input type="file" name="file" id="fileInput" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.5rem; color: var(--text-primary); margin-top: 0.5rem;" onchange="checkFileSize(this)">
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Commit Work</button>
                <a href="{% url 'task_detail' task.id %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
function checkFileSize(input) {
    if (input.files && input.files[0]) {
        if (input.files[0].size > 25 * 1024 * 1024) {
            alert("File size exceeds 25 MB limit. Please select a smaller file.");
            input.value = ""; // Clear the file input
        }
    }
}
</script>
{% endblock %}
