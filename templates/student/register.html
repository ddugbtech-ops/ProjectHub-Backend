{% extends 'base.html' %}

{% block title %}Student Register - ProjectHub{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 400px; margin: 5rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Student Registration</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Create a password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Student Account</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Already have an account? <a href="{% url 'student_login' %}" style="color: var(--accent-secondary);">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
