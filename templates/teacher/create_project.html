{% extends 'base.html' %}

{% block title %}Create Project - ProjectHub{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 600px; margin: 2rem auto;">
    <div class="glass-card">
        <h2 style="margin-bottom: 2rem;">Create <span style="color: var(--accent-primary);">New Project</span></h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" name="name" required placeholder="e.g. AI Research 2024">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="5" required placeholder="Describe the project goals and requirements..."></textarea>
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" name="deadline" required>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Create Project</button>
                <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
