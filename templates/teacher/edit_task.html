{% extends 'base.html' %}

{% block title %}Edit Task - {{ task.name }}{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 600px; margin: 2rem auto;">
    <div class="glass-card">
        <h2 style="margin-bottom: 2rem;">Edit <span style="color: var(--accent-secondary);">Task</span></h2>
        <p style="margin-bottom: 1.5rem; color: var(--text-secondary);">Assigned to: {{ task.assigned_to.get_full_name }}</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Task Name</label>
                <input type="text" name="name" value="{{ task.name }}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" required>{{ task.description }}</textarea>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    {% for value, label in task.STATUS_CHOICES %}
                        <option value="{{ value }}" {% if task.status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" name="deadline" value="{{ task.deadline|date:'Y-m-d' }}" required>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Update Task</button>
                <a href="{% url 'project_detail' task.project.id %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
