{% extends 'base.html' %}

{% block title %}Teacher Login - ProjectHub{% endblock %}

{% block content %}
<div class="fade-in" style="max-width: 400px; margin: 5rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Teacher Login</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login to Dashboard</button>
        </form>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="{% url 'password_reset' %}" style="color: var(--text-secondary); font-size: 0.9rem;">Forgot Password?</a>
        </div>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Don't have an account? <a href="{% url 'teacher_register' %}" style="color: var(--accent-secondary);">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
